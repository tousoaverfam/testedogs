<!DOCTYPE html>
<html lang="pt-PT">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Adoção | Animais para Adoção</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<!-- HEADER GERADO PELO layout.js -->

<div id="header"></div>




<main>


<!-- CABEÇALHO DA PÁGINA -->

<section class="page-header">

    <div class="container">

        <h1>
            Animais para Adoção
        </h1>


        <p>
            Conheça os animais que procuram uma família
            e descubra aquele que pode ser o seu novo companheiro.
        </p>

    </div>

</section>







<!-- FILTROS -->

<section>

    <div class="container">


        <div class="filters">


            <div class="search">

                <input 
                type="text"
                id="searchInput"
                placeholder="Pesquisar por nome..."
                >

            </div>





            <div class="filter-buttons">


                <button 
                class="filter active"
                data-filter="todos">

                    Todos

                </button>



                <button 
                class="filter"
                data-filter="cao">

                    🐶 Cães

                </button>




                <button 
                class="filter"
                data-filter="gato">

                    🐱 Gatos

                </button>


            </div>


        </div>


    </div>

</section>








<!-- LISTAGEM DOS ANIMAIS -->

<section>


    <div class="container">


        <div 
        class="animals-grid"
        id="animalsGrid">


            <!--
            Os animais são carregados
            automaticamente através do dados.json
            -->


        </div>


    </div>


</section>





</main>









<!-- MODAL DOS ANIMAIS -->

<div class="modal" id="animalModal">


    <div class="modal-content">


        <button 
        class="close"
        id="closeModal">

            ×

        </button>




        <div id="modalContent">

            <!-- Conteúdo criado pelo app.js -->

        </div>



    </div>


</div>








<!-- FOOTER GERADO PELO layout.js -->

<div id="footer"></div>









<!-- JAVASCRIPT -->


<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/layout.js"></script>

<script src="js/app.js"></script>


</body>


</html>
```
