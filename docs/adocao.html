<!DOCTYPE html>
<html lang="pt-PT">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Adoção | Animais para Adoção</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://unpkg.com/lucide@latest"></script>

</head>


<body>


<!-- HEADER -->




<main>



<!-- CABEÇALHO DA PÁGINA -->

<section class="page-header">


<div class="container">


<h1>
Animais disponíveis para adoção
</h1>


<p>
Conheça os animais que procuram uma família e descubra
aquele que pode ser o seu novo companheiro.
</p>


</div>


</section>







<!-- FILTROS -->


<section>


<div class="container">


<div class="filters">



<div class="search">

<input 
type="text"
id="searchInput"
placeholder="Pesquisar por nome..."
>


</div>





<div class="filter-buttons">


<button 
class="filter active"
data-filter="todos">

Todos

</button>



<button 
class="filter"
data-filter="cao">

Cães

</button>



<button 
class="filter"
data-filter="gato">

Gatos

</button>



</div>



</div>


</div>


</section>







<!-- ANIMAIS -->


<section>


<div class="container">


<div 
class="animals-grid"
id="animalsGrid">


<!-- 
Os cartões dos animais
são inseridos automaticamente
pelo JavaScript
-->


</div>


</div>


</section>






</main>








<!-- MODAL -->

<div class="modal" id="animalModal">


<div class="modal-content">


<button class="close" id="closeModal">
×
</button>



<div id="modalContent">

<!-- Conteúdo inserido pelo JS -->

</div>



</div>


</div>

<!-- JAVASCRIPT -->


<script src="https://unpkg.com/lucide@latest"></script>

<script src="js/layout.js"></script>


<script>

lucide.createIcons();

</script>



</body>


</html>
